<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="2200" viewBox="0 0 2000 2200" role="img" aria-labelledby="title desc">
  <title id="title">AI4Radiology SSPH logo</title>
  <desc id="desc">AI4R monogram with brain and musculoskeletal imaging line art, using teal, red and blue with full Chinese institution names.</desc>
  <defs>
    <style><![CDATA[
      .latin { font-family: "Noto Sans Display", "Noto Sans", "Arial", sans-serif; font-weight: 700; }
      .latin-heavy { font-family: "Noto Sans Display", "Noto Sans", "Arial", sans-serif; font-weight: 800; }
      .cn { font-family: "Noto Sans CJK SC", "Source Han Sans SC", "Microsoft YaHei", "PingFang SC", sans-serif; font-weight: 700; }
      .linecap { stroke-linecap: round; stroke-linejoin: round; fill: none; }
    ]]></style>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#08264A" flood-opacity="0.06"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="2000" height="2200" fill="#FFFFFF" opacity="0"/>

  <!-- Main icon: simple circular imaging window + neuro / musculoskeletal line art -->
  <g id="icon" filter="url(#softShadow)">
    <!-- circular frame: 六院青绿 + 医学院蓝 -->
    <path d="M 605.96 592.45 A 395 395 0 0 1 951.86 227.94" class="linecap" stroke="#009A8D" stroke-width="24"/>
    <path d="M 1034.43 226.50 A 395 395 0 0 1 1387.74 544.63" class="linecap" stroke="#009A8D" stroke-width="24"/>
    <path d="M 1054.97 228.84 A 395 395 0 0 1 1027.55 1014.04" class="linecap" stroke="#0057A8" stroke-width="24"/>
    <path d="M 931.41 1009.00 A 395 395 0 0 1 611.00 688.59" class="linecap" stroke="#0057A8" stroke-width="24"/>

    <!-- subtle internal divider -->
    <path d="M1000 260 C995 390 995 500 1000 620 C1005 745 1005 875 1000 980" class="linecap" stroke="#B7C6D8" stroke-width="4" opacity="0.85"/>

    <!-- brain line art: neuro imaging -->
    <g id="brain-lines" stroke="#7D91AE" stroke-width="5" opacity="0.78" class="linecap">
      <path d="M735 355 C675 355 624 395 614 456 C567 478 548 525 561 574 C526 615 531 675 575 710 C558 770 597 825 657 838 C672 890 724 918 778 900 C816 936 880 926 902 875 C956 864 986 812 967 760 C1008 718 1004 653 960 616 C982 560 948 501 892 491 C882 428 825 388 765 403 C756 379 748 365 735 355 Z"/>
      <path d="M616 456 C676 455 704 486 703 539 C753 506 810 525 823 583 C873 557 928 584 931 642"/>
      <path d="M561 574 C620 589 650 620 645 677 C699 648 756 667 769 723 C823 698 879 718 895 771"/>
      <path d="M575 710 C632 721 664 759 657 838"/>
      <path d="M657 838 C707 820 760 832 778 900"/>
      <path d="M735 355 C735 414 763 447 823 440"/>
      <path d="M892 491 C864 526 864 557 892 592"/>
      <path d="M703 539 C681 579 693 620 728 648"/>
      <path d="M769 723 C748 766 765 812 810 836"/>
      <path d="M902 875 C885 826 906 789 960 760"/>
    </g>

    <!-- bone / joint line art: musculoskeletal imaging -->
    <g id="bone-lines" stroke="#7D91AE" stroke-width="5" opacity="0.78" class="linecap">
      <path d="M1186 332 C1205 348 1232 350 1256 338 C1280 326 1312 341 1313 370 C1315 399 1292 414 1267 409 C1234 403 1216 420 1218 454 C1222 532 1222 576 1215 620"/>
      <path d="M1297 357 C1270 382 1259 414 1260 456 C1262 514 1260 568 1254 620"/>
      <path d="M1205 620 C1236 651 1271 651 1303 620"/>
      <path d="M1213 653 C1219 730 1222 806 1215 884 C1210 930 1230 957 1267 967"/>
      <path d="M1295 653 C1289 730 1286 806 1294 884 C1299 930 1279 957 1242 967"/>
      <path d="M1216 884 C1236 902 1274 902 1294 884"/>
      <path d="M1185 620 C1215 638 1284 638 1315 620" opacity="0.75"/>
    </g>

    <!-- compact AI4R monogram. Red R creates the radiology / red-color pun. -->
    <text x="1000" y="735" text-anchor="middle" class="latin-heavy" font-size="292" fill="#0057A8">AI4R</text>
    <text x="868.5" y="735" class="latin-heavy" font-size="292" fill="#009A8D">I</text>
    <text x="1140.5" y="735" class="latin-heavy" font-size="292" fill="#C8102E">R</text>
  </g>

  <!-- English wordmark. Text is editable; color overlays keep spacing stable in SVG/PDF/PNG exports. -->
  <g id="wordmark" aria-label="AI4Radiology SSPH">
    <text x="1000" y="1298" text-anchor="middle" class="latin" font-size="166" letter-spacing="-1" fill="#0057A8">AI4Radiology</text>
    <text x="585.0" y="1298" class="latin" font-size="166" letter-spacing="-1" fill="#009A8D">I4</text>
    <text x="739.0" y="1298" class="latin" font-size="166" letter-spacing="-1" fill="#C8102E">R</text>

    <line x1="315" y1="1438" x2="785" y2="1438" stroke="#009A8D" stroke-width="7" stroke-linecap="round"/>
    <text x="1000" y="1466" text-anchor="middle" class="latin" font-size="72" letter-spacing="28" fill="#009A8D">SSPH</text>
    <line x1="1215" y1="1438" x2="1685" y2="1438" stroke="#009A8D" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Full Chinese names, not abbreviated -->
  <g id="full-chinese-name" fill="#003A70">
    <text x="1000" y="1582" text-anchor="middle" class="cn" font-size="48" letter-spacing="4">上海市第六人民医院  放射介入科  医学影像人工智能实验室</text>
    <text x="1000" y="1662" text-anchor="middle" class="cn" font-size="48" letter-spacing="4">上海交通大学影像医学研究所  人工智能团队</text>
  </g>

  <g id="color-dots" opacity="0.95">
    <circle cx="952" cy="1518" r="11" fill="#009A8D"/>
    <circle cx="1000" cy="1518" r="11" fill="#C8102E"/>
    <circle cx="1048" cy="1518" r="11" fill="#0057A8"/>
  </g>
</svg>
